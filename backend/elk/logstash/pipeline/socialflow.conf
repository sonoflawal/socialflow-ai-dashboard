input {
  # Receives logs forwarded directly from the Node.js app via HTTP
  http {
    port => 5000
    codec => json
  }
}

filter {
  # Promote @timestamp from the app payload if present
  if [fields][timestamp] {
    date {
      match => ["[fields][timestamp]", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Tag error-level logs for easy Kibana alerting
  if [severity] == "error" {
    mutate { add_tag => ["error"] }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[service][name]}-%{+YYYY.MM.dd}"
  }
}
